<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aceitar · Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #112240;
    --surface: #1a3158;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #f0f0f0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Calibri, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 2.5rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: white;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 20px; height: 20px; }

  .logo-text {
    font-family: 'Righteous', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .logo-sub {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
    display: block;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .clock {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  .add-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1.1rem;
    border-radius: 8px;
    font-family: Calibri, sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: background 0.2s, border-color 0.2s;
  }

  .add-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.15);
  }

  /* Main */
  main {
    position: relative;
    z-index: 10;
    padding: 3rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    font-weight: 500;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
  }

  /* App Card */
  .app-card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    animation: cardIn 0.5s ease both;
  }

  .app-card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .app-card:hover .card-arrow {
    transform: translate(4px, -4px);
    opacity: 1;
  }

  .app-card:hover .card-glow {
    opacity: 0.6;
  }

  /* Card Inner */
  .card-inner {
    padding: 2.2rem 2.2rem 2rem;
    height: 100%;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  /* Glow effect */
  .card-glow {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: 1;
    pointer-events: none;
  }

  /* Top row */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-badge {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 0.3rem 0.7rem;
    border-radius: 100px;
    background: rgba(0,0,0,0.25);
    color: rgba(255,255,255,0.7);
    backdrop-filter: blur(4px);
  }

  .card-arrow {
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.5;
    transition: transform 0.3s ease, opacity 0.3s ease;
    backdrop-filter: blur(4px);
    flex-shrink: 0;
  }

  /* Bottom */
  .card-bottom { margin-top: 2rem; }

  .card-title {
    font-family: 'Righteous', cursive;
    font-size: 3.4rem;
    font-weight: 700;
    line-height: 1;
    color: white;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    margin-bottom: 0.5rem;
  }

  .card-desc {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    font-weight: 400;
    max-width: 280px;
  }

  /* Edit overlay */
  .card-edit {
    position: absolute;
    top: 0.8rem;
    right: 3rem;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .app-card:hover .card-edit {
    opacity: 1;
  }

  .edit-btn {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: Calibri, sans-serif;
    backdrop-filter: blur(8px);
  }

  .edit-btn:hover { background: rgba(0,0,0,0.6); }

  /* Add new card */
  .add-card {
    border-radius: 16px;
    border: 2px dashed rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    min-height: 200px;
    transition: border-color 0.2s, background 0.2s;
    animation: cardIn 0.5s ease both;
    background: rgba(255,255,255,0.02);
  }

  .add-card:hover {
    border-color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.04);
  }

  .add-card-inner {
    text-align: center;
    color: var(--muted);
  }

  .add-card-icon {
    width: 48px;
    height: 48px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.8rem;
    font-size: 1.4rem;
  }

  .add-card-label {
    font-size: 0.82rem;
    letter-spacing: 0.05em;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #1a3158;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 2.5rem;
    width: 90%;
    max-width: 480px;
    animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalIn {
    from { transform: scale(0.92) translateY(12px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Righteous', cursive;
    font-size: 1.7rem;
    font-weight: 600;
    margin-bottom: 2rem;
  }

  .form-group { margin-bottom: 1.2rem; }

  label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  input, textarea, select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: Calibri, sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus, select:focus {
    border-color: rgba(255,255,255,0.3);
  }

  select option { background: #1a1d27; }

  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0.5rem;
  }

  .color-swatch {
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }

  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: white; transform: scale(1.1); }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 2rem;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    padding: 0.6rem 1.4rem;
    border-radius: 10px;
    font-family: Calibri, sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-cancel:hover { background: rgba(255,255,255,0.1); }

  .btn-save {
    background: white;
    border: none;
    color: #0d0f14;
    padding: 0.6rem 1.6rem;
    border-radius: 10px;
    font-family: 'Righteous', cursive;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-save:hover { opacity: 0.85; }

  .btn-delete {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.2);
    color: #ef4444;
    padding: 0.6rem 1.2rem;
    border-radius: 10px;
    font-family: Calibri, sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    margin-right: auto;
    transition: background 0.2s;
  }

  .btn-delete:hover { background: rgba(239,68,68,0.2); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Weather Panel */
  .weather-panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 1.4rem 2rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow: hidden;
  }

  .weather-loading-full {
    color: var(--muted);
    font-size: 0.85rem;
    padding: 0.5rem;
  }

  /* Current conditions */
  .wx-current {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding-right: 2rem;
    border-right: 1px solid rgba(255,255,255,0.1);
    min-width: 220px;
    flex-shrink: 0;
  }

  .wx-current-icon { font-size: 3.2rem; line-height: 1; }

  .wx-current-info { display: flex; flex-direction: column; gap: 2px; }

  .wx-city {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .wx-temp-big {
    font-size: 2.4rem;
    font-weight: 700;
    color: white;
    line-height: 1;
  }

  .wx-desc {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.6);
    text-transform: capitalize;
  }

  .wx-details {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Weekly forecast */
  .wx-week {
    display: flex;
    flex: 1;
    padding-left: 2rem;
    gap: 0;
    overflow-x: auto;
  }

  .wx-day {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0.4rem 0.8rem;
    border-radius: 10px;
    transition: background 0.2s;
    min-width: 70px;
  }

  .wx-day:hover { background: rgba(255,255,255,0.06); }

  .wx-day.today {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .wx-day-name {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .wx-day.today .wx-day-name { color: rgba(255,255,255,0.8); }

  .wx-day-icon { font-size: 1.5rem; line-height: 1; }

  .wx-day-temps {
    display: flex;
    gap: 5px;
    align-items: center;
    font-size: 0.78rem;
  }

  .wx-day-max { color: white; font-weight: 600; }
  .wx-day-min { color: var(--muted); }

  .wx-day-bar {
    width: 32px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
  }

  .wx-day-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #3b82f6, #f0a040);
  }

  /* News Panel */
  .news-panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .news-header { padding: 1rem 1.5rem 0; }
  .news-title-row { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
  .news-label { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 600; flex-shrink: 0; }
  .news-cats { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .news-cat { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--muted); padding: 0.3rem 0.8rem; border-radius: 100px; font-size: 0.75rem; font-family: Calibri, sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .news-cat:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .news-cat.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); color: white; }
  .news-list { padding: 0.8rem 1.5rem 1.2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.5rem; }
  .news-loading { color: var(--muted); font-size: 0.82rem; padding: 0.8rem 0; grid-column: 1/-1; }
  .news-item { display: flex; gap: 0.8rem; padding: 0.7rem 0.8rem; border-radius: 10px; cursor: pointer; text-decoration: none; transition: background 0.15s; align-items: flex-start; }
  .news-item:hover { background: rgba(255,255,255,0.06); }
  .news-num { font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,0.12); line-height: 1.2; flex-shrink: 0; min-width: 20px; }
  .news-content { flex: 1; min-width: 0; }
  .news-headline { font-size: 0.84rem; color: var(--text); line-height: 1.4; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .news-meta { font-size: 0.68rem; color: var(--muted); margin-top: 3px; display: flex; gap: 0.5rem; }
  .news-source { color: rgba(255,255,255,0.35); }

  @media (max-width: 640px) {
    header { padding: 1.5rem; }
    main { padding: 1.5rem; }
    .grid { grid-template-columns: 1fr; }
    .card-title { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
          <defs>
            <linearGradient id="bolt" x1="10" y1="1" x2="10" y2="19" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#f9d923"/>
              <stop offset="50%" stop-color="#f0882a"/>
              <stop offset="100%" stop-color="#e8304a"/>
            </linearGradient>
          </defs>
          <path d="M12 1L4 11h6l-2 8 8-10h-6l2-8z" fill="url(#bolt)" stroke="none"/>
        </svg>
      </div>
    <div>
      <span class="logo-text">CSF</span>
      <span class="logo-sub">Platform</span>
    </div>
  </div>
  <div class="header-right">
    <canvas id="clock" width="64" height="64"></canvas>
  </div>
</header>

<main>
  <!-- Weather Panel -->
  <div class="weather-panel" id="weather-panel">
    <div class="weather-loading-full">A carregar meteorologia⋯</div>
  </div>

  <div class="news-panel" id="news-panel">
    <div class="news-header">
      <div class="news-title-row">
        <span class="news-label">Notícias</span>
        <div class="news-cats" id="news-cats">
          <button class="news-cat active" data-q="Portugal">🇵🇹 Portugal</button>
          <button class="news-cat" data-q="Economia Portugal">💼 Economia</button>
          <button class="news-cat" data-q="Construção obras Portugal">🏗️ Construção</button>
          <button class="news-cat" data-q="Tecnologia">💡 Tecnologia</button>
          <button class="news-cat" data-q="Desporto Portugal">⚽ Desporto</button>
        </div>
      </div>
    </div>
    <div class="news-list" id="news-list">
      <div class="news-loading">A carregar notícias⋯</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeIfOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nova Aplicação</div>

    <div class="form-group">
      <label>Sigla / Nome curto</label>
      <input type="text" id="f-name" placeholder="ex: SIGO" maxlength="10">
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <input type="text" id="f-desc" placeholder="ex: Gestão de Obras e Projetos">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="url" id="f-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select id="f-badge">
        <option value="Gestão">Gestão</option>
        <option value="Fiscalização">Fiscalização</option>
        <option value="Segurança">Segurança</option>
        <option value="Documentação">Documentação</option>
        <option value="Relatórios">Relatórios</option>
        <option value="Interno">Interno</option>
      </select>
    </div>
    <div class="form-group">
      <label>Cor do cartão</label>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteApp()">Eliminar</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveApp()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ─── Paletas de gradiente ────────────────────────────────────────────────────
const PALETTES = [
  { id: 'blue',    bg: 'linear-gradient(135deg, #1a3a6b 0%, #0f5fa8 60%, #1e8fd4 100%)', glow: 'rgba(14,95,168,0.6)' },
  { id: 'teal',    bg: 'linear-gradient(135deg, #0d4a4a 0%, #0a7a6a 60%, #1ab39a 100%)', glow: 'rgba(10,122,106,0.6)' },
  { id: 'orange',  bg: 'linear-gradient(135deg, #6b2d0d 0%, #c05a1a 60%, #f0882a 100%)', glow: 'rgba(192,90,26,0.6)' },
  { id: 'violet',  bg: 'linear-gradient(135deg, #2d1a6b 0%, #5a2db0 60%, #8c52e8 100%)', glow: 'rgba(90,45,176,0.6)' },
  { id: 'rose',    bg: 'linear-gradient(135deg, #6b1a3a 0%, #b02060 60%, #e84080 100%)', glow: 'rgba(176,32,96,0.6)' },
  { id: 'green',   bg: 'linear-gradient(135deg, #1a4a1a 0%, #2a8a2a 60%, #48c048 100%)', glow: 'rgba(42,138,42,0.6)' },
  { id: 'slate',   bg: 'linear-gradient(135deg, #1a2040 0%, #2a3a6a 60%, #4a5a9a 100%)', glow: 'rgba(42,58,106,0.6)' },
  { id: 'amber',   bg: 'linear-gradient(135deg, #5a3a00 0%, #b07800 60%, #e8b800 100%)', glow: 'rgba(176,120,0,0.6)' },
  { id: 'crimson', bg: 'linear-gradient(135deg, #5a1010 0%, #a02020 60%, #d84040 100%)', glow: 'rgba(160,32,32,0.6)' },
  { id: 'cyan',    bg: 'linear-gradient(135deg, #0a2a4a 0%, #0a6a9a 60%, #20b0e0 100%)', glow: 'rgba(10,106,154,0.6)' },
  { id: 'sand',    bg: 'linear-gradient(135deg, #3a2a10 0%, #7a5a20 60%, #c09050 100%)', glow: 'rgba(122,90,32,0.6)' },

// ─── Clock ───────────────────────────────────────────────────────────────────
function updateClock() {
  const canvas = document.getElementById('clock');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 64;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);

  const cx = size / 2, cy = size / 2, r = size / 2 - 3;
  const now = new Date();

  ctx.clearRect(0, 0, size, size);

  // Face
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Hour marks
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const isMajor = i % 3 === 0;
    const x1 = cx + Math.cos(angle) * (r - 3);
    const y1 = cy + Math.sin(angle) * (r - 3);
    const x2 = cx + Math.cos(angle) * (r - (isMajor ? 9 : 6));
    const y2 = cy + Math.sin(angle) * (r - (isMajor ? 9 : 6));
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = isMajor ? 1.5 : 1;
    ctx.stroke();
  }

  const sec = now.getSeconds() + now.getMilliseconds() / 1000;
  const min = now.getMinutes() + sec / 60;
  const hr  = (now.getHours() % 12) + min / 60;

  // Hour hand
  const hrAngle = (hr / 12) * Math.PI * 2 - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(hrAngle) * (r * 0.52), cy + Math.sin(hrAngle) * (r * 0.52));
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Minute hand
  const minAngle = (min / 60) * Math.PI * 2 - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(minAngle) * (r * 0.75), cy + Math.sin(minAngle) * (r * 0.75));
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Second hand
  const secAngle = (sec / 60) * Math.PI * 2 - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx - Math.cos(secAngle) * (r * 0.2), cy - Math.sin(secAngle) * (r * 0.2));
  ctx.lineTo(cx + Math.cos(secAngle) * (r * 0.85), cy + Math.sin(secAngle) * (r * 0.85));
  ctx.strokeStyle = '#f0a040';
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Centre dot
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#f0a040';
  ctx.fill();

  requestAnimationFrame(updateClock);
}

// ─── Weather ─────────────────────────────────────────────────────────────────
const WEATHER_ICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',
  95:'⛈️',96:'⛈️',99:'⛈️'
};

const WX_DESC = {
  0:'Céu limpo',1:'Maioritariamente limpo',2:'Parcialmente nublado',3:'Nublado',
  45:'Névoa',48:'Névoa com gelo',51:'Chuvisco leve',53:'Chuvisco moderado',55:'Chuvisco intenso',
  61:'Chuva leve',63:'Chuva moderada',65:'Chuva intensa',71:'Neve leve',73:'Neve moderada',
  75:'Neve intensa',80:'Aguaceiros leves',81:'Aguaceiros',82:'Aguaceiros intensos',
  95:'Trovoada',96:'Trovoada com granizo',99:'Trovoada intensa'
};

const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

async function loadWeather() {
  let lat = 38.72, lon = -9.14, city = 'Lisboa';

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 6000 })
    );
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    try {
      const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`).then(r => r.json());
      city = geo.address?.city || geo.address?.town || geo.address?.village || geo.address?.county || 'Localização';
    } catch {}
  } catch {}

  try {
    const wx = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,windspeed_10m_max,precipitation_probability_max` +
      `&timezone=auto&forecast_days=7`
    ).then(r => r.json());

    const cur = wx.current_weather;
    const daily = wx.daily;
    const curIcon = WEATHER_ICONS[cur.weathercode] || '🌡️';
    const curDesc = WX_DESC[cur.weathercode] || '';

    const allMax = daily.temperature_2m_max;
    const allMin = daily.temperature_2m_min;
    const absMax = Math.max(...allMax);
    const absMin = Math.min(...allMin);

    const today = new Date();

    let daysHtml = daily.time.map((dateStr, i) => {
      const d = new Date(dateStr + 'T12:00:00');
      const name = i === 0 ? 'Hoje' : DAYS_PT[d.getDay()];
      const icon = WEATHER_ICONS[daily.weathercode[i]] || '🌡️';
      const max = Math.round(daily.temperature_2m_max[i]);
      const min = Math.round(daily.temperature_2m_min[i]);
      const range = absMax - absMin || 1;
      const barW = Math.round(((max - absMin) / range) * 100);
      const isToday = i === 0;
      return `
        <div class="wx-day${isToday ? ' today' : ''}">
          <div class="wx-day-name">${name}</div>
          <div class="wx-day-icon">${icon}</div>
          <div class="wx-day-temps">
            <span class="wx-day-max">${max}°</span>
            <span class="wx-day-min">${min}°</span>
          </div>
          <div class="wx-day-bar"><div class="wx-day-bar-fill" style="width:${barW}%"></div></div>
        </div>`;
    }).join('');

    document.getElementById('weather-panel').innerHTML = `
      <div class="wx-current">
        <div class="wx-current-icon">${curIcon}</div>
        <div class="wx-current-info">
          <div class="wx-city">📍 ${city}</div>
          <div class="wx-temp-big">${Math.round(cur.temperature)}°C</div>
          <div class="wx-desc">${curDesc}</div>
          <div class="wx-details">💨 ${Math.round(cur.windspeed)} km/h</div>
        </div>
      </div>
      <div class="wx-week">${daysHtml}</div>
    `;
  } catch {
    document.getElementById('weather-panel').style.display = 'none';
  }
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  apps.forEach((app, i) => {
    const pal = PALETTES.find(p => p.id === app.palette) || PALETTES[0];
    const card = document.createElement('a');
    card.className = 'app-card';
    card.href = app.url || '#';
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.style.animationDelay = `${i * 0.06}s`;

    card.innerHTML = `
      <div class="card-glow" style="background: radial-gradient(ellipse at 30% 30%, ${pal.glow}, transparent 70%);"></div>
      <div class="card-inner" style="background: ${pal.bg};">
        <div class="card-top">
          <span class="card-badge">${app.badge}</span>
          <div class="card-arrow">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 11L11 3M11 3H5M11 3V9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="card-bottom">
          <div class="card-title">${app.name}</div>
          <div class="card-desc">${app.desc}</div>
        </div>
      </div>
      <div class="card-edit">
        <button class="edit-btn" onclick="event.preventDefault(); openModal(${app.id})">Editar</button>
      </div>
    `;
    grid.appendChild(card);
  });

  // Add card
  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.style.animationDelay = `${apps.length * 0.06}s`;
  addCard.onclick = () => openModal();
  addCard.innerHTML = `
    <div class="add-card-inner">
      <div class="add-card-icon">＋</div>
      <div class="add-card-label">Adicionar aplicação</div>
    </div>
  `;
  grid.appendChild(addCard);
}

// ─── Color swatches ──────────────────────────────────────────────────────────
function renderSwatches() {
  const cg = document.getElementById('color-grid');
  cg.innerHTML = '';
  PALETTES.forEach(pal => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (selectedPalette === pal.id ? ' selected' : '');
    sw.style.background = pal.bg;
    sw.title = pal.id;
    sw.onclick = () => {
      selectedPalette = pal.id;
      renderSwatches();
    };
    cg.appendChild(sw);
  });
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  selectedPalette = PALETTES[0].id;

  document.getElementById('modal-title').textContent = id ? 'Editar Aplicação' : 'Nova Aplicação';
  document.getElementById('btn-delete').style.display = id ? 'block' : 'none';

  if (id) {
    const app = apps.find(a => a.id === id);
    document.getElementById('f-name').value = app.name;
    document.getElementById('f-desc').value = app.desc;
    document.getElementById('f-url').value = app.url;
    document.getElementById('f-badge').value = app.badge;
    selectedPalette = app.palette || PALETTES[0].id;
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('f-badge').value = 'Gestão';
  }

  renderSwatches();
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function closeIfOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function saveApp() {
  const name = document.getElementById('f-name').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const url  = document.getElementById('f-url').value.trim();
  const badge = document.getElementById('f-badge').value;

  if (!name || !url) { alert('Nome e URL são obrigatórios.'); return; }

  if (editingId) {
    const idx = apps.findIndex(a => a.id === editingId);
    apps[idx] = { ...apps[idx], name, desc, url, badge, palette: selectedPalette };
  } else {
    apps.push({ id: Date.now(), name, desc, url, badge, palette: selectedPalette });
  }

  save();
  closeModal();
  render();
}

function deleteApp() {
  if (!confirm('Eliminar esta aplicação?')) return;
  apps = apps.filter(a => a.id !== editingId);
  save();
  closeModal();
  render();
}

// ─── News ─────────────────────────────────────────────────────────────────────
// URL da tua API Vercel — muda para o domínio do teu projeto
const NEWS_API = '/api/noticias';

async function loadNews(query = 'Portugal') {
  const list = document.getElementById('news-list');
  list.innerHTML = '<div class="news-loading">A carregar notícias⋯</div>';

  try {
    const url = `${NEWS_API}?q=${encodeURIComponent(query)}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, 'application/xml');
    const items = Array.from(xml.querySelectorAll('item')).slice(0, 12);
    if (!items.length) throw new Error('sem items');

    list.innerHTML = items.map((item, i) => {
      const title   = (item.querySelector('title')?.textContent || '').replace(/ - [^-]+$/, '');
      const link    = item.querySelector('link')?.textContent || '#';
      const source  = item.querySelector('source')?.textContent || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      const date    = pubDate ? new Date(pubDate).toLocaleDateString('pt-PT', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
      return `<a class="news-item" href="${link}" target="_blank" rel="noopener">
        <div class="news-num">${String(i+1).padStart(2,'0')}</div>
        <div class="news-content">
          <div class="news-headline">${title}</div>
          <div class="news-meta">
            <span class="news-source">${source}</span>
            ${date ? `<span>·</span><span>${date}</span>` : ''}
          </div>
        </div>
      </a>`;
    }).join('');
  } catch {
    list.innerHTML = `<div class="news-loading">
      ⚠️ API de notícias não disponível localmente.<br>
      <small style="opacity:0.6">Faz deploy no Vercel com o ficheiro <code>api/noticias.js</code> incluído.</small>
    </div>`;
  }
}

// Tabs de categoria
document.getElementById('news-cats').addEventListener('click', e => {
  const btn = e.target.closest('.news-cat');
  if (!btn) return;
  document.querySelectorAll('.news-cat').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadNews(btn.dataset.q);
});

// ─── Init ────────────────────────────────────────────────────────────────────
render();
updateClock();
loadWeather();
loadNews();
</script>
