<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aceitar Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
<style>
  :root { --bg:#112240; --surface:#0d1b35; --panel:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.09); --text:#e8eaf0; --muted:rgba(255,255,255,0.38); --gold:#f0a040; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:Calibri,sans-serif;font-size:14px;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);position:relative;z-index:10;}
  .header-inner{max-width:1600px;margin:0 auto;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:.7rem;}
  .logo-mark{width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
  .logo-text{font-family:'Righteous',cursive;font-size:1.2rem;font-weight:700;letter-spacing:.04em;color:var(--text);}
  .logo-sub{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;display:block;margin-top:1px;}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;}
  .clock-digital{text-align:right;line-height:1.3;}
  .clock-day{font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
  .clock-time{font-size:1.6rem;font-weight:300;color:white;letter-spacing:.06em;font-variant-numeric:tabular-nums;}
  .clock-date{font-size:.72rem;color:var(--muted);}
  .wx-location-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);font-family:Calibri,sans-serif;font-size:.75rem;padding:.25rem .6rem;cursor:pointer;outline:none;}
  .wx-location-sel option{background:#0d1b35;}
  main{max-width:1600px;margin:0 auto;padding:1.5rem 2rem;display:flex;flex-direction:column;gap:1rem;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem;}
  .panel-label{font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  /* Meteo */
  .wx-current{display:flex;align-items:center;gap:1rem;margin-bottom:.8rem;}
  .wx-icon{font-size:2.6rem;line-height:1;}
  .wx-temp{font-size:2rem;font-weight:300;color:white;line-height:1;}
  .wx-desc{font-size:.8rem;color:rgba(255,255,255,.55);}
  .wx-wind{font-size:.75rem;color:var(--muted);margin-top:2px;}
  .wx-week{display:flex;gap:5px;}
  .wx-day{flex:1;text-align:center;background:rgba(255,255,255,.04);border-radius:8px;padding:5px 3px;}
  .wx-day.today{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);}
  .wx-dn{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .wx-di{font-size:1rem;margin:2px 0;}
  .wx-dt{font-size:.75rem;color:white;font-weight:500;}
  .wx-dm{font-size:.65rem;color:var(--muted);}
  /* Aniversários */
  .bday-item{display:flex;align-items:center;gap:.7rem;padding:.45rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
  .bday-item:last-child{border-bottom:none;}
  .bday-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;color:rgba(255,255,255,.6);flex-shrink:0;}
  .bday-avatar.hoje{background:rgba(240,160,64,.2);border-color:rgba(240,160,64,.5);color:var(--gold);}
  .bday-name{font-size:.82rem;color:rgba(255,255,255,.85);font-weight:400;}
  .bday-date{font-size:.78rem;color:var(--muted);}
  .bday-badge{margin-left:auto;flex-shrink:0;font-size:.68rem;background:rgba(240,160,64,.15);color:var(--gold);border:1px solid rgba(240,160,64,.3);border-radius:100px;padding:2px 8px;}
  .bday-badge.soon{background:rgba(255,255,255,.06);color:var(--muted);border-color:rgba(255,255,255,.1);}
  /* Notícias */
  .news-cats{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.7rem;}
  .news-cat{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:.25rem .75rem;border-radius:100px;font-size:.75rem;font-family:Calibri,sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .news-cat:hover{border-color:rgba(255,255,255,.25);color:var(--text);}
  .news-cat.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:white;}
  .news-list{display:flex;flex-direction:column;gap:2px;}
  .news-item{display:flex;gap:.6rem;padding:.45rem .5rem;border-radius:7px;text-decoration:none;transition:background .15s;align-items:flex-start;}
  .news-item:hover{background:rgba(255,255,255,.06);}
  .news-num{font-size:.85rem;font-weight:700;color:rgba(255,255,255,.1);flex-shrink:0;min-width:18px;}
  .news-headline{font-size:.82rem;color:var(--text);line-height:1.35;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .news-meta{font-size:.7rem;color:var(--muted);margin-top:2px;display:flex;gap:.4rem;}
  .news-loading{font-size:.82rem;color:var(--muted);padding:.5rem 0;}
  /* Efemérides */
  .efem-date{font-size:.75rem;color:rgba(255,255,255,.45);margin-bottom:.7rem;}
  .efem-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
  .efem-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:.6rem .8rem;display:flex;gap:.6rem;align-items:flex-start;}
  .efem-card.hl{border-color:rgba(240,160,64,.3);background:rgba(240,160,64,.05);}
  .efem-ei{font-size:1.2rem;line-height:1;flex-shrink:0;margin-top:1px;}
  .efem-tag{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .efem-title{font-size:.82rem;color:rgba(255,255,255,.85);line-height:1.35;margin-top:2px;font-weight:400;}
  .efem-sub{font-size:.75rem;color:var(--muted);margin-top:2px;}
  /* Apps */
  .apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
  .app-card{border-radius:14px;overflow:hidden;cursor:pointer;text-decoration:none;display:block;position:relative;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;animation:cardIn .5s ease both;}
  .app-card:hover{transform:translateY(-5px) scale(1.01);box-shadow:0 20px 50px rgba(0,0,0,.45);}
  .app-card:hover .card-arrow{transform:translate(3px,-3px);opacity:1;}
  .card-inner{padding:1.3rem;min-height:140px;display:flex;flex-direction:column;justify-content:space-between;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .card-badge{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding:.22rem .6rem;border-radius:100px;background:rgba(0,0,0,.22);color:rgba(255,255,255,.65);}
  .card-arrow{width:26px;height:26px;background:rgba(0,0,0,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:.4;transition:transform .25s,opacity .25s;}
  .card-title{font-family:'Righteous',cursive;font-size:2.4rem;color:white;line-height:1;margin-bottom:.25rem;}
  .card-desc{font-size:.78rem;color:rgba(255,255,255,.6);}
  .card-edit{position:absolute;top:.6rem;right:2rem;z-index:10;opacity:0;transition:opacity .2s;}
  .app-card:hover .card-edit{opacity:1;}
  .edit-btn{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);color:white;border-radius:5px;padding:.22rem .5rem;font-size:.7rem;cursor:pointer;font-family:Calibri,sans-serif;}
  .add-card{border-radius:14px;border:2px dashed rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:140px;transition:border-color .2s,background .2s;background:rgba(255,255,255,.02);}
  .add-card:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.04);}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#0f1e38;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:2rem;width:90%;max-width:460px;animation:modalIn .3s cubic-bezier(.34,1.56,.64,1);}
  @keyframes modalIn{from{transform:scale(.92) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  @keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .modal-title{font-size:1.2rem;font-weight:600;margin-bottom:1.5rem;}
  .form-group{margin-bottom:1rem;}
  label{display:block;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
  input,select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:.65rem .9rem;color:var(--text);font-family:Calibri,sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
  input:focus,select:focus{border-color:rgba(255,255,255,.3);}
  select option{background:#0f1e38;}
  .color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.4rem;}
  .color-swatch{height:30px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
  .color-swatch:hover{transform:scale(1.1);}
  .color-swatch.selected{border-color:white;transform:scale(1.1);}
  .modal-actions{display:flex;gap:.6rem;margin-top:1.5rem;justify-content:flex-end;}
  .btn-cancel{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:.5rem 1.2rem;border-radius:9px;font-family:Calibri,sans-serif;font-size:.85rem;cursor:pointer;}
  .btn-save{background:white;border:none;color:#112240;padding:.5rem 1.4rem;border-radius:9px;font-family:Calibri,sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;}
  .btn-save:hover{opacity:.85;}
  .btn-delete{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:.5rem 1rem;border-radius:9px;font-family:Calibri,sans-serif;font-size:.85rem;cursor:pointer;margin-right:auto;}
  @media(max-width:800px){.row-2{grid-template-columns:1fr;}header{padding:1rem;}main{padding:1rem;}}
</style>
</head>

<main>
  <div class="row-2">
    <div class="panel" id="weather-panel"><div class="panel-label">Meteorologia</div><div style="color:var(--muted);font-size:.82rem;">A carregar⋯</div></div>
    <div class="panel" style="display:flex;flex-direction:column;gap:.8rem;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;flex:1;">
        <div>
          <div class="panel-label">🎂 Aniversários do mês</div>
          <div id="bday-list"><div style="color:var(--muted);font-size:.82rem;">A carregar⋯</div></div>

function updateClock(){

// ANIVERSÁRIOS
function loadBirthdays(){
  const list=document.getElementById('bday-list');
  const now=new Date();
  const mesAtual=now.getMonth()+1;
  const diaAtual=now.getDate();

  function daysUntil(dia,mes){
    const yr=now.getFullYear();
    let next=new Date(yr,mes-1,dia);
    const today=new Date(yr,now.getMonth(),diaAtual);
    if(next<today)next=new Date(yr+1,mes-1,dia);
    return Math.round((next-today)/86400000);
  }

  const doMes=ANIVERSARIOS
    .filter(p=>p.mes===mesAtual)
    .sort((a,b)=>a.dia-b.dia);

  if(!doMes.length){list.innerHTML=`<div style="color:var(--muted);font-size:.82rem;padding:.3rem 0;">Nenhum aniversário este mês.</div>`;return;}
  list.innerHTML=doMes.map(p=>{
    const dias=daysUntil(p.dia,p.mes);
    const isHoje=dias===0;
    const label=isHoje?'🎉 Hoje!':`${p.dia} ${MESES_C[p.mes-1]}`;
    return `<div class="bday-item"><div class="bday-avatar${isHoje?' hoje':''}">${p.iniciais}</div><div style="flex:1;min-width:0;"><div class="bday-name">${p.nome}</div><div class="bday-date">${label}</div></div>${isHoje?`<div class="bday-badge">🎉 Hoje!</div>`:''}</div>`;
  }).join('');
}

async function loadWeather(){
  const panel=document.getElementById('weather-panel');
  const sel=document.getElementById('wx-location');
  const parts=(sel?.value||'41.15|-8.61|Porto').split('|');
  const lat=parseFloat(parts[0]),lon=parseFloat(parts[1]),city=parts[2];
  try{
    const wx=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`).then(r=>r.json());
    const cur=wx.current_weather,d=wx.daily;
    const weekHtml=d.time.map((dt,i)=>{const day=new Date(dt+'T12:00:00');return `<div class="wx-day${i===0?' today':''}"><div class="wx-dn">${i===0?'Hoje':DIAS_C[day.getDay()]}</div><div class="wx-di">${WX_ICONS[d.weathercode[i]]||'🌡️'}</div><div class="wx-dt">${Math.round(d.temperature_2m_max[i])}°</div><div class="wx-dm">${Math.round(d.temperature_2m_min[i])}°</div></div>`;}).join('');

  }catch{panel.innerHTML='<div class="panel-label">🌤️ Meteorologia</div><div style="color:var(--muted);font-size:.82rem;">Indisponível</div>';}
}

async function loadNews(query='Portugal'){
  const list=document.getElementById('news-list');
  list.innerHTML='<div class="news-loading">A carregar notícias⋯</div>';
  try{
    const res=await fetch(`/api/noticias?q=${encodeURIComponent(query)}`,{signal:AbortSignal.timeout(8000)});
    if(!res.ok)throw new Error();
    const xml=new DOMParser().parseFromString(await res.text(),'application/xml');
    const items=Array.from(xml.querySelectorAll('item')).slice(0,12);
    if(!items.length)throw new Error();
    list.innerHTML=items.map((item,i)=>{
      const title=(item.querySelector('title')?.textContent||'').replace(/ - [^-]+$/,'');
      const link=item.querySelector('link')?.textContent||'#';
      const source=item.querySelector('source')?.textContent||'';
      const pub=item.querySelector('pubDate')?.textContent||'';
      const date=pub?new Date(pub).toLocaleDateString('pt-PT',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
      return `<a class="news-item" href="${link}" target="_blank" rel="noopener"><div class="news-num">${String(i+1).padStart(2,'0')}</div><div><div class="news-headline">${title}</div><div class="news-meta"><span style="color:rgba(255,255,255,.28)">${source}</span>${date?`<span>·</span><span>${date}</span>`:''}</div></div></a>`;
    }).join('');
  }catch{list.innerHTML='<div class="news-loading">⚠️ Notícias indisponíveis — funciona após deploy no Vercel.</div>';}
}

async function loadEfemérides(){
  const now=new Date(),d=now.getDate(),m=now.getMonth()+1,year=now.getFullYear();
  document.getElementById('efem-date').textContent=`${DIAS_PT[now.getDay()]}, ${d} de ${MESES_PT[m-1]} de ${year}`;
  const body=document.getElementById('efem-body');
  let cards=[];
  const feriado=FERIADOS.find(f=>f.dia===d&&f.mes===m);
  if(feriado)cards.push(`<div class="efem-card hl"><div class="efem-ei">${feriado.icon}</div><div><div class="efem-tag">Feriado Nacional</div><div class="efem-title">${feriado.nome}</div></div></div>`);
  const santo=SANTOS[`${m}-${d}`];
  if(santo)cards.push(`<div class="efem-card hl"><div class="efem-ei">✝️</div><div><div class="efem-tag">Santo do Dia</div><div class="efem-title">${santo}</div></div></div>`);
  try{
    const pad=n=>String(n).padStart(2,'0');
    const data=await fetch(`https://pt.wikipedia.org/api/rest_v1/feed/onthisday/all/${pad(m)}/${pad(d)}`).then(r=>r.json());
    (data.births||[]).filter(e=>e.year&&e.pages?.length).slice(0,2).forEach(e=>{const nome=e.pages[0]?.titles?.normalized||e.text;const desc=(e.pages[0]?.description||'').slice(0,60);cards.push(`<div class="efem-card"><div class="efem-ei">🎂</div><div><div class="efem-tag">Nasceu em ${e.year}</div><div class="efem-title">${nome}</div>${desc?`<div class="efem-sub">${desc}</div>`:''}</div></div>`);});
    (data.deaths||[]).filter(e=>e.year&&e.pages?.length).slice(0,2).forEach(e=>{const nome=e.pages[0]?.titles?.normalized||e.text;const desc=(e.pages[0]?.description||'').slice(0,60);cards.push(`<div class="efem-card"><div class="efem-ei">🕯️</div><div><div class="efem-tag">Faleceu em ${e.year}</div><div class="efem-title">${nome}</div>${desc?`<div class="efem-sub">${desc}</div>`:''}</div></div>`);});
    (data.events||[]).filter(e=>e.year&&e.pages?.length).sort((a,b)=>a.year-b.year).slice(0,2).forEach(e=>{const titulo=e.pages[0]?.titles?.normalized||e.text.slice(0,60);const desc=(e.pages[0]?.description||e.text||'').slice(0,80);cards.push(`<div class="efem-card"><div class="efem-ei">📜</div><div><div class="efem-tag">Aconteceu em ${e.year}</div><div class="efem-title">${titulo}</div>${desc&&desc!==titulo?`<div class="efem-sub">${desc}</div>`:''}</div></div>`);});

}

}

function saveApp(){
  const name=document.getElementById('f-name').value.trim(),desc=document.getElementById('f-desc').value.trim(),url=document.getElementById('f-url').value.trim(),badge=document.getElementById('f-badge').value;
  if(!name||!url){alert('Nome e URL são obrigatórios.');return;}
  if(editingId){const idx=apps.findIndex(a=>a.id===editingId);apps[idx]={...apps[idx],name,desc,url,badge,palette:selectedPalette};}
  else{apps.push({id:Date.now(),name,desc,url,badge,palette:selectedPalette});}
  saveApps();closeModal();render();
}
function deleteApp(){if(!confirm('Eliminar esta aplicação?'))return;apps=apps.filter(a=>a.id!==editingId);saveApps();closeModal();render();}

render();loadWeather();loadBirthdays();loadFeriados();loadNews();loadEfemérides();
</script>
